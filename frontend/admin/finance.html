<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>财务管理 - Cargo 管理系统</title>
  <link rel="stylesheet" href="./common.css" />
  <style>
    .page-content .tab { font-size:13px; font-weight:600; padding:6px 10px; min-height:34px; }
    .page-content .form-label { font-size:13px; font-weight:600; }
    .page-content .form-input,
    .page-content .form-select { height:34px; font-size:13px; padding:5px 9px; }
    .page-content .filter-bar .btn.btn--sm { min-height:34px; font-size:13px; padding:0 9px; }
    .page-content .table th { font-size:14px; font-weight:600; padding-top:9px; padding-bottom:9px; }
    .page-content .table td { font-size:12px; height:42px; }
    .page-content .badge { font-size:12px; padding:1px 6px; }
    .page-content .pagination__total,
    .page-content .pagination__btn,
    .page-content .pagination__size-select { font-size:12px; min-height:30px; }
    @media(max-width:1200px){
      .page-content .tab { font-size:13px; min-height:32px; }
      .page-content .form-label { font-size:11px; }
      .page-content .form-input,
      .page-content .form-select { height:32px; font-size:11px; }
      .page-content .filter-bar .btn.btn--sm { min-height:32px; font-size:11px; }
      .page-content .table th,
      .page-content .table td { font-size:12px; }
      .page-content .pagination__total,
      .page-content .pagination__btn,
      .page-content .pagination__size-select { font-size:11px; min-height:26px; }
    }
  </style>
</head>
<body>
  <header class="nav-bar" id="navbar">
    <div class="nav-bar__left">
      <button class="nav-bar__hamburger" id="hamburgerBtn" aria-label="菜单">☰</button>
      <a class="nav-bar__logo" href="./index.html"><span class="nav-bar__logo-text">Cargo 管理系统</span></a>
    </div>
    <div class="nav-bar__right">
      <button class="nav-bar__theme-btn" id="themeBtn">🌙</button>
      <span class="nav-bar__user"><span class="nav-bar__username" id="navUsername">未登录</span><span class="badge badge--blue nav-bar__role" id="navRole" style="display:none;"></span></span>
      <button class="btn btn--ghost btn--sm" id="logoutBtn">退出</button>
    </div>
  </header>

  <aside class="layout-sidebar" id="sidebar">
    <nav class="sidebar__nav">
      <a class="sidebar__item" href="./index.html" data-tooltip="总览仪表盘">
        <svg class="sidebar__icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5"/><path d="M8 8L8 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M8 8L11 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="8" r="1" fill="currentColor"/></svg>
        <span class="sidebar__label">总览仪表盘</span>
      </a>
      <a class="sidebar__item" href="./orders.html" data-tooltip="销售管理">
        <svg class="sidebar__icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M2 2h1.5l1.8 7.5h7l1.2-5H5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7" cy="13" r="1" fill="currentColor"/><circle cx="11" cy="13" r="1" fill="currentColor"/></svg>
        <span class="sidebar__label">销售管理</span>
      </a>
      <a class="sidebar__item" href="./inventory.html" data-tooltip="库存管理">
        <svg class="sidebar__icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="1.5" y="7" width="13" height="7.5" rx="1" stroke="currentColor" stroke-width="1.5"/><path d="M1.5 7l6.5-5.5L14.5 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="5.5" y="10" width="5" height="4.5" rx="0.5" stroke="currentColor" stroke-width="1.2"/></svg>
        <span class="sidebar__label">库存管理</span>
      </a>
      <a class="sidebar__item active" href="./finance.html" data-tooltip="财务管理">
        <svg class="sidebar__icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="1.5" y="2.5" width="13" height="11" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M1.5 6h13" stroke="currentColor" stroke-width="1.5"/><path d="M5 9.5h2M9 9.5h2M5 12h2M9 12h2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        <span class="sidebar__label">财务管理</span>
      </a>
      <a class="sidebar__item" href="./users.html" data-perm-any="user.manage" data-tooltip="员工权限">
        <svg class="sidebar__icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="6" cy="5" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M1.5 13.5c0-2.485 2.015-4.5 4.5-4.5s4.5 2.015 4.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M11 7.5c1.105 0 2 .895 2 2M13 4.5c.828 0 1.5.672 1.5 1.5S13.828 7.5 13 7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <span class="sidebar__label">员工权限</span>
      </a>
    </nav>
    </aside>
  <div class="drawer-overlay" id="drawerOverlay"></div>

  <main class="layout-main">
    <nav class="breadcrumb"><a class="breadcrumb__item" href="./index.html">首页</a><span class="breadcrumb__sep">/</span><span class="breadcrumb__item breadcrumb__item--active">财务管理</span></nav>
    <div class="page-content">
          <div class="tabs">
        <button class="tab active" id="tab-invoices-btn" onclick="switchTab('invoices')">发票管理</button>
        <button class="tab" id="tab-requests-btn" onclick="switchTab('requests')">请款单管理</button>
        <button class="tab" id="tab-receipts-btn" onclick="switchTab('receipts')">回款记录</button>
          </div>

      <section class="tab-panel active" id="tab-invoices">
        <div class="filter-bar">
          <div class="form-item"><label class="form-label">发票号</label><input class="form-input" id="invoiceNoFilter"></div>
          <div class="form-item"><label class="form-label">客户</label><input class="form-input" id="invoiceCustomerFilter"></div>
          <div class="form-item"><label class="form-label">状态</label><select class="form-select" id="invoiceStatusFilter"><option value="">全部</option><option value="DRAFT">草稿</option><option value="ISSUED">已开具</option><option value="VOID">已作废</option></select></div>
          <div class="filter-bar__actions">
            <button class="btn btn--primary btn--sm" onclick="renderInvoices()">查询</button>
            <button class="btn btn--default btn--sm" onclick="resetInvoiceFilter()">重置</button>
            <button class="btn btn--default btn--sm" data-perm-any="finance.edit" onclick="openCreateInvoiceModal()">生成发票</button>
          </div>
                </div>
        <div class="table-wrap"><table class="table"><thead><tr><th>发票号</th><th>客户</th><th>关联送货单</th><th>日期</th><th>金额</th><th>状态</th><th>操作</th></tr></thead><tbody id="invoiceBody"></tbody></table></div>
        <div id="invoicePagination"></div>
      </section>

      <section class="tab-panel" id="tab-requests">
        <div class="filter-bar">
          <div class="form-item"><label class="form-label">请款号</label><input class="form-input" id="requestNoFilter"></div>
          <div class="form-item"><label class="form-label">状态</label><select class="form-select" id="requestStatusFilter"><option value="">全部</option><option value="DRAFT">草稿</option><option value="SUBMITTED">已提交</option><option value="APPROVED">已审批</option><option value="REJECTED">已拒绝</option><option value="CLOSED">已关闭</option></select></div>
          <div class="filter-bar__actions">
            <button class="btn btn--primary btn--sm" onclick="renderRequests()">查询</button>
            <button class="btn btn--default btn--sm" onclick="resetRequestFilter()">重置</button>
            <button class="btn btn--default btn--sm" data-perm-any="finance.edit" onclick="openCreateRequestModal()">新建请款单</button>
          </div>
                </div>
        <div class="table-wrap"><table class="table"><thead><tr><th>请款号</th><th>发票号</th><th>客户</th><th>金额</th><th>日期</th><th>状态</th><th>操作</th></tr></thead><tbody id="requestBody"></tbody></table></div>
        <div id="requestPagination"></div>
      </section>

      <section class="tab-panel" id="tab-receipts">
        <div class="filter-bar">
          <div class="form-item"><label class="form-label">回款号</label><input class="form-input" id="receiptNoFilter"></div>
          <div class="filter-bar__actions">
            <button class="btn btn--primary btn--sm" onclick="renderReceipts()">查询</button>
            <button class="btn btn--default btn--sm" onclick="resetReceiptFilter()">重置</button>
            <button class="btn btn--default btn--sm" data-perm-any="finance.edit" onclick="openCreateReceiptModal()">新建回款</button>
          </div>
        </div>
        <div class="table-wrap"><table class="table"><thead><tr><th>回款号</th><th>发票号</th><th>客户</th><th>金额</th><th>回款日期</th></tr></thead><tbody id="receiptBody"></tbody></table></div>
        <div id="receiptPagination"></div>
      </section>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>
  <div class="modal-overlay" id="modalOverlay" style="display:none;"><div class="modal"><div class="modal__header" id="modalHeader"></div><div class="modal__body" id="modalBody"></div><div class="modal__footer" id="modalFooter"></div></div></div>

  <script src="./config.js"></script>
  <script src="./common.js"></script>
  <script src="./finance.js"></script>
</body>
</html>
