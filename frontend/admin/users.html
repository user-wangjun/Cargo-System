<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>员工权限管理</title>
  <link rel="stylesheet" href="./common.css" />
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="logo">Cargo Admin</div>
      <a class="nav-link" href="./index.html">总览仪表盘</a>
      <a class="nav-link" href="./orders.html">销售管理</a>
      <a class="nav-link" href="./inventory.html">库存管理</a>
      <a class="nav-link" href="./finance.html">财务管理</a>
      <a class="nav-link active" href="./users.html">员工权限</a>
    </aside>
    <main class="main">
      <section class="top">
        <div><div class="title">员工权限管理</div><div class="hint">老板/管理员可创建员工并分配角色</div></div>
        <span id="loginStatus" class="status warn">未登录</span>
      </section>

      <section class="row">
        <div class="card col-12">
          <strong>新建员工</strong>
          <div class="grid-4" style="margin-top:8px;">
            <div><div class="label">用户名</div><input id="newUsername" /></div>
            <div><div class="label">密码</div><input id="newPassword" value="staff123" /></div>
            <div><div class="label">姓名</div><input id="newFullName" /></div>
            <div><div class="label">角色</div><select id="newRole"></select></div>
          </div>
          <div style="margin-top:10px;display:flex;gap:8px;"><button onclick="createUser()">创建员工</button><button class="ghost" onclick="loadPage()">刷新</button></div>
        </div>
      </section>

      <section class="row">
        <div class="card col-12">
          <strong>员工列表</strong>
          <table>
            <thead><tr><th>用户名</th><th>姓名</th><th>角色</th><th>操作</th></tr></thead>
            <tbody id="userBody"><tr><td colspan="4">暂无数据</td></tr></tbody>
          </table>
          <div id="log" class="log">等待操作...</div>
        </div>
      </section>
    </main>
  </div>

  <script src="./common.js"></script>
  <script>
    const log = setupAuthPanel("log");
    const state = { roles: [], users: [] };

    async function loadPage() {
      try {
        if (!hasPermission("user.manage")) {
          log("当前账号无 user.manage 权限，无法管理员工。");
          return;
        }
        const [r, u] = await Promise.all([request("/org/roles"), request("/org/users")]);
        state.roles = r.data || [];
        state.users = u.data || [];

        document.getElementById("newRole").innerHTML = state.roles.map(x => `<option value="${x.code}">${x.code}</option>`).join("");

        document.getElementById("userBody").innerHTML = state.users.length
          ? state.users.map(x => `
              <tr>
                <td>${x.username || "-"}</td>
                <td>${x.fullName || "-"}</td>
                <td>
                  <select id="role_${x.id}">${state.roles.map(r => `<option value="${r.code}" ${((x.roles||[]).includes(r.code)?"selected":"")}>${r.code}</option>`).join("")}</select>
                </td>
                <td><button onclick="updateRole('${x.id}')">更新角色</button></td>
              </tr>
            `).join("")
          : "<tr><td colspan='4'>暂无数据</td></tr>";

        log("员工列表刷新成功。");
      } catch (err) {
        log("加载失败: " + safeMsg(err));
      }
    }

    async function createUser() {
      try {
        const payload = {
          username: document.getElementById("newUsername").value.trim(),
          password: document.getElementById("newPassword").value.trim(),
          fullName: document.getElementById("newFullName").value.trim(),
          roleCodes: [document.getElementById("newRole").value]
        };
        const res = await request("/org/users", { method: "POST", body: JSON.stringify(payload) });
        log(res);
        await loadPage();
      } catch (err) {
        log("创建失败: " + safeMsg(err));
      }
    }

    async function updateRole(userId) {
      try {
        const role = document.getElementById(`role_${userId}`).value;
        const res = await request(`/org/users/${userId}/roles`, { method: "PATCH", body: JSON.stringify({ roleCodes: [role] }) });
        log(res);
        await loadPage();
      } catch (err) {
        log("更新失败: " + safeMsg(err));
      }
    }
  </script>
</body>
</html>
