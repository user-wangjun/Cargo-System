<!doctype html>
<html lang="zh-CN" data-theme="light">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>请款管理 - Cargo 用户端</title><link rel="stylesheet" href="./common.css" /></head>
<body>
  <header class="nav-bar"><div class="nav-bar__left"><button class="nav-bar__hamburger" id="hamburgerBtn">☰</button><a class="nav-bar__logo" href="./index.html"><span class="nav-bar__logo-text">Cargo 用户端</span></a></div><div class="nav-bar__right"><button class="nav-bar__theme-btn" id="themeBtn">🌙</button><span class="nav-bar__user"><span class="nav-bar__username" id="navUsername">未登录</span><span class="badge badge--blue nav-bar__role" id="navRole" style="display:none;"></span></span><button class="btn btn--ghost btn--sm" id="logoutBtn">退出</button></div></header>
  <aside class="layout-sidebar" id="sidebar"><nav class="sidebar__nav"><a class="sidebar__item" href="./index.html"><span class="sidebar__label">财务看板</span></a><a class="sidebar__item" href="./invoices.html"><span class="sidebar__label">发票管理</span></a><a class="sidebar__item active" href="./requests.html" data-perm-any="finance.edit,finance.approve"><span class="sidebar__label">请款管理</span></a><a class="sidebar__item" href="./receipts.html" data-perm-any="finance.edit"><span class="sidebar__label">回款记录</span></a></nav></aside>
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <main class="layout-main"><nav class="breadcrumb"><a class="breadcrumb__item" href="./index.html">首页</a><span class="breadcrumb__sep">/</span><span class="breadcrumb__item breadcrumb__item--active">请款管理</span></nav><div class="page-content"><div class="filter-bar"><div class="form-item"><label class="form-label">请款号</label><input class="form-input" id="filterNo"></div><div class="form-item"><label class="form-label">状态</label><select class="form-select" id="filterStatus"><option value="">全部</option><option value="DRAFT">草稿</option><option value="SUBMITTED">已提交</option><option value="APPROVED">已审批</option><option value="REJECTED">已拒绝</option><option value="CLOSED">已关闭</option></select></div><div class="filter-bar__actions"><button class="btn btn--primary btn--sm" onclick="renderList()">查询</button><button class="btn btn--default btn--sm" onclick="resetFilter()">重置</button><button class="btn btn--default btn--sm" data-perm-any="finance.edit" onclick="openCreateModal()">新建请款单</button></div></div><div class="table-wrap"><table class="table"><thead><tr><th>请款号</th><th>发票号</th><th>客户</th><th>金额</th><th>日期</th><th>状态</th><th>操作</th></tr></thead><tbody id="requestBody"></tbody></table></div><div id="requestPagination"></div></div></main>
  <div class="toast-container" id="toastContainer"></div><div class="modal-overlay" id="modalOverlay" style="display:none;"><div class="modal"><div class="modal__header" id="modalHeader"></div><div class="modal__body" id="modalBody"></div><div class="modal__footer" id="modalFooter"></div></div></div>
  <script src="./config.js"></script>
  <script src="./common.js"></script>
  <script>
    initTheme(); initSidebar(); initNavbar(); initMobileDrawer();
    const state = { invoices: [], requests: [], page:1, pageSize:10 };
    async function loadPage(){ try{ const [i,p] = await Promise.all([request("/invoices?page=1&pageSize=200"), request("/payment-requests?page=1&pageSize=200")]); state.invoices = i?.data?.list || i?.data || []; state.requests = p?.data?.list || p?.data || []; renderList(); }catch(err){ showToast("error","请款加载失败："+(err?.message||"未知错误")); } }
    function paginate(list,page,size){ const total=list.length; return { total, rows:list.slice((page-1)*size, (page-1)*size+size) }; }
    function renderList(){ let list=state.requests; list=filterByField(list,"requestNo",document.getElementById("filterNo").value.trim()); list=filterByField(list,"status",document.getElementById("filterStatus").value); const pageData=paginate(list,state.page,state.pageSize); document.getElementById("requestBody").innerHTML = pageData.rows.length ? pageData.rows.map((x)=>{ const ops=[]; if(x.status==="SUBMITTED" && hasPermission("finance.approve")){ ops.push(`<button class="btn btn--icon" title="审批" onclick="approveReq('${_escAttr(x.id)}')">✅</button>`); ops.push(`<button class="btn btn--icon" title="拒绝" onclick="rejectReq('${_escAttr(x.id)}')">❌</button>`); } return `<tr><td>${_escHtml(x.requestNo||"-")}</td><td>${_escHtml(x.invoiceNo||x.invoiceId||"-")}</td><td>${_escHtml(x.customerName||"-")}</td><td>${x.requestedAmount||0}</td><td>${_escHtml((x.requestDate||"").slice(0,10))}</td><td>${renderBadge(x.status)}</td><td>${ops.join("")||"-"}</td></tr>`; }).join("") : '<tr><td colspan="7"><div class="empty-state"><span class="empty-state__text">暂无数据</span></div></td></tr>'; renderPagination("requestPagination",pageData.total,state.page,state.pageSize,(p,s)=>{ state.page=p; state.pageSize=s; renderList(); }); }
    function resetFilter(){ document.getElementById("filterNo").value=""; document.getElementById("filterStatus").value=""; renderList(); }
    function openCreateModal(){ showModal({ title:"新建请款单", body:`<div class="form-item"><label class="form-label form-label--required">客户</label><select class="form-select" id="newCustomer" onchange="window._fillInv()"><option value="">请选择客户</option>${[...new Map(state.invoices.map((i)=>[String(i.customerId), i])).values()].map((i)=>`<option value="${_escAttr(i.customerId)}">${_escHtml(i.customerName||i.customerId)}</option>`).join("")}</select><span class="form-error" id="err-newCustomer"></span></div><div class="form-item"><label class="form-label form-label--required">发票</label><select class="form-select" id="newInvoice"></select><span class="form-error" id="err-newInvoice"></span></div><div class="form-item"><label class="form-label form-label--required">日期</label><input class="form-input" id="newDate" type="date" value="${getLocalDateInputValue()}"></div><div class="form-item"><label class="form-label form-label--required">金额</label><input class="form-input" id="newAmount" type="number" min="0" step="0.01"></div>`, footer:`<button class="btn btn--ghost btn--sm" onclick="closeModal()">取消</button><button class="btn btn--primary btn--sm" onclick="saveReq()">提交</button>` }); window._fillInv=()=>{ const cid=document.getElementById("newCustomer").value; const list=state.invoices.filter((i)=>String(i.customerId)===String(cid)); document.getElementById("newInvoice").innerHTML = `<option value="">请选择发票</option>`+list.map((i)=>`<option value="${_escAttr(i.id)}" data-amt="${i.totalAmount||0}">${_escHtml(i.invoiceNo||i.id)}</option>`).join(""); }; window._fillInv(); }
    async function saveReq(){ clearFieldErrors(["newCustomer","newInvoice"]); const customerId=document.getElementById("newCustomer").value; const invoiceId=document.getElementById("newInvoice").value; const requestDate=document.getElementById("newDate").value; const requestedAmount=Number(document.getElementById("newAmount").value||0); if(!customerId) showFieldError("newCustomer","请选择客户"); if(!invoiceId) showFieldError("newInvoice","请选择发票"); if(!customerId||!invoiceId||!requestDate||!requestedAmount) return; try{ await request("/payment-requests",{ method:"POST", body: JSON.stringify({ customerId, invoiceId, requestDate, requestedAmount }) }); closeModal(); showToast("success","请款单创建成功"); await loadPage(); }catch(err){ showToast("error","创建失败："+(err?.message||"未知错误")); } }
    async function approveReq(id){ try{ await request(`/payment-requests/${id}/approve`,{ method:"POST" }); showToast("success","已审批"); await loadPage(); }catch(err){ showToast("error","审批失败："+(err?.message||"未知错误")); } }
    async function rejectReq(id){ try{ await request(`/payment-requests/${id}/reject`,{ method:"POST" }); showToast("success","已拒绝"); await loadPage(); }catch(err){ showToast("error","拒绝失败："+(err?.message||"未知错误")); } }
    window.openCreateModal=openCreateModal; window.saveReq=saveReq; window.approveReq=approveReq; window.rejectReq=rejectReq;
    loadPage();
  </script>
</body></html>
