<!doctype html>
<html lang="zh-CN" data-theme="light">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>回款记录 - Cargo 用户端</title><link rel="stylesheet" href="./common.css" /></head>
<body>
  <header class="nav-bar"><div class="nav-bar__left"><button class="nav-bar__hamburger" id="hamburgerBtn">☰</button><a class="nav-bar__logo" href="./index.html"><span class="nav-bar__logo-text">Cargo 用户端</span></a></div><div class="nav-bar__right"><button class="nav-bar__theme-btn" id="themeBtn">🌙</button><span class="nav-bar__user"><span class="nav-bar__username" id="navUsername">未登录</span><span class="badge badge--blue nav-bar__role" id="navRole" style="display:none;"></span></span><button class="btn btn--ghost btn--sm" id="logoutBtn">退出</button></div></header>
  <aside class="layout-sidebar" id="sidebar"><nav class="sidebar__nav"><a class="sidebar__item" href="./index.html"><span class="sidebar__label">财务看板</span></a><a class="sidebar__item" href="./invoices.html"><span class="sidebar__label">发票管理</span></a><a class="sidebar__item" href="./requests.html" data-perm-any="finance.edit,finance.approve"><span class="sidebar__label">请款管理</span></a><a class="sidebar__item active" href="./receipts.html" data-perm-any="finance.edit"><span class="sidebar__label">回款记录</span></a></nav></aside>
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <main class="layout-main"><nav class="breadcrumb"><a class="breadcrumb__item" href="./index.html">首页</a><span class="breadcrumb__sep">/</span><span class="breadcrumb__item breadcrumb__item--active">回款记录</span></nav><div class="page-content"><div class="filter-bar"><div class="form-item"><label class="form-label">回款号</label><input class="form-input" id="filterNo"></div><div class="filter-bar__actions"><button class="btn btn--primary btn--sm" onclick="renderList()">查询</button><button class="btn btn--default btn--sm" onclick="resetFilter()">重置</button><button class="btn btn--default btn--sm" data-perm-any="finance.edit" onclick="openCreateModal()">新建回款</button></div></div><div class="table-wrap"><table class="table"><thead><tr><th>回款号</th><th>发票号</th><th>客户</th><th>金额</th><th>日期</th></tr></thead><tbody id="receiptBody"></tbody></table></div><div id="receiptPagination"></div></div></main>
  <div class="toast-container" id="toastContainer"></div><div class="modal-overlay" id="modalOverlay" style="display:none;"><div class="modal"><div class="modal__header" id="modalHeader"></div><div class="modal__body" id="modalBody"></div><div class="modal__footer" id="modalFooter"></div></div></div>
  <script src="./config.js"></script>
  <script src="./common.js"></script>
  <script>
    initTheme(); initSidebar(); initNavbar(); initMobileDrawer();
    const state = { invoices: [], receipts: [], page:1, pageSize:10 };
    async function loadPage(){ try{ const [i,r] = await Promise.all([request("/invoices?page=1&pageSize=200"), request("/receipts?page=1&pageSize=200")]); state.invoices = i?.data?.list || i?.data || []; state.receipts = r?.data?.list || r?.data || []; renderList(); }catch(err){ showToast("error","回款加载失败："+(err?.message||"未知错误")); } }
    function paginate(list,page,size){ const total=list.length; return { total, rows:list.slice((page-1)*size, (page-1)*size+size) }; }
    function renderList(){ let list=state.receipts; list=filterByField(list,"receiptNo",document.getElementById("filterNo").value.trim()); const pageData=paginate(list,state.page,state.pageSize); document.getElementById("receiptBody").innerHTML = pageData.rows.length ? pageData.rows.map((x)=>`<tr><td>${_escHtml(x.receiptNo||"-")}</td><td>${_escHtml(x.invoiceNo||x.invoiceId||"-")}</td><td>${_escHtml(x.customerName||"-")}</td><td>${x.amount||0}</td><td>${_escHtml((x.receivedDate||"").slice(0,10))}</td></tr>`).join("") : '<tr><td colspan="5"><div class="empty-state"><span class="empty-state__text">暂无数据</span></div></td></tr>'; renderPagination("receiptPagination",pageData.total,state.page,state.pageSize,(p,s)=>{ state.page=p; state.pageSize=s; renderList(); }); }
    function resetFilter(){ document.getElementById("filterNo").value=""; renderList(); }
    function openCreateModal(){ showModal({ title:"新建回款", body:`<div class="form-item"><label class="form-label form-label--required">发票</label><select class="form-select" id="newInv">${state.invoices.map((i)=>`<option value="${_escAttr(i.id)}">${_escHtml(i.invoiceNo||i.id)} / ${_escHtml(i.customerName||"-")}</option>`).join("")}</select><span class="form-error" id="err-newInv"></span></div><div class="form-item"><label class="form-label form-label--required">金额</label><input class="form-input" id="newAmt" type="number" min="0" step="0.01"><span class="form-error" id="err-newAmt"></span></div><div class="form-item"><label class="form-label form-label--required">日期</label><input class="form-input" id="newDate" type="date" value="${getLocalDateInputValue()}"><span class="form-error" id="err-newDate"></span></div>`, footer:`<button class="btn btn--ghost btn--sm" onclick="closeModal()">取消</button><button class="btn btn--primary btn--sm" onclick="saveReceipt()">提交</button>` }); }
    async function saveReceipt(){ clearFieldErrors(["newInv","newAmt","newDate"]); const invoiceId=document.getElementById("newInv").value; const invoice=state.invoices.find((i)=>String(i.id)===String(invoiceId)); const customerId=String(invoice?.customerId||""); const amount=Number(document.getElementById("newAmt").value||0); const receivedDate=document.getElementById("newDate").value; if(!invoiceId) showFieldError("newInv","请选择发票"); if(!amount) showFieldError("newAmt","请输入金额"); if(!receivedDate) showFieldError("newDate","请选择日期"); if(!customerId) showToast("error","所选发票缺少客户信息"); if(!invoiceId || !customerId || !amount || !receivedDate) return; try{ await request("/receipts",{ method:"POST", body: JSON.stringify({ customerId, invoiceId, amount, receivedDate }) }); closeModal(); showToast("success","回款登记成功"); await loadPage(); }catch(err){ showToast("error","登记失败："+(err?.message||"未知错误")); } }
    window.openCreateModal=openCreateModal; window.saveReceipt=saveReceipt;
    loadPage();
  </script>
</body></html>
