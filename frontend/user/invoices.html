<!doctype html>
<html lang="zh-CN" data-theme="light">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>发票管理 - Cargo 用户端</title><link rel="stylesheet" href="./common.css" /></head>
<body>
  <header class="nav-bar"><div class="nav-bar__left"><button class="nav-bar__hamburger" id="hamburgerBtn">☰</button><a class="nav-bar__logo" href="./index.html"><span class="nav-bar__logo-text">Cargo 用户端</span></a></div><div class="nav-bar__right"><button class="nav-bar__theme-btn" id="themeBtn">🌙</button><span class="nav-bar__user"><span class="nav-bar__username" id="navUsername">未登录</span><span class="badge badge--blue nav-bar__role" id="navRole" style="display:none;"></span></span><button class="btn btn--ghost btn--sm" id="logoutBtn">退出</button></div></header>
  <aside class="layout-sidebar" id="sidebar"><nav class="sidebar__nav"><a class="sidebar__item" href="./index.html"><span class="sidebar__label">财务看板</span></a><a class="sidebar__item active" href="./invoices.html"><span class="sidebar__label">发票管理</span></a><a class="sidebar__item" href="./requests.html" data-perm-any="finance.edit,finance.approve"><span class="sidebar__label">请款管理</span></a><a class="sidebar__item" href="./receipts.html" data-perm-any="finance.edit"><span class="sidebar__label">回款记录</span></a></nav></aside>
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <main class="layout-main"><nav class="breadcrumb"><a class="breadcrumb__item" href="./index.html">首页</a><span class="breadcrumb__sep">/</span><span class="breadcrumb__item breadcrumb__item--active">发票管理</span></nav><div class="page-content"><div class="filter-bar"><div class="form-item"><label class="form-label">发票号</label><input class="form-input" id="filterNo"></div><div class="form-item"><label class="form-label">客户</label><input class="form-input" id="filterCustomer"></div><div class="form-item"><label class="form-label">状态</label><select class="form-select" id="filterStatus"><option value="">全部</option><option value="DRAFT">草稿</option><option value="ISSUED">已开具</option><option value="VOID">已作废</option></select></div><div class="filter-bar__actions"><button class="btn btn--primary btn--sm" onclick="renderList()">查询</button><button class="btn btn--default btn--sm" onclick="resetFilter()">重置</button></div></div><div class="table-wrap"><table class="table"><thead><tr><th>发票号</th><th>客户</th><th>关联送货单</th><th>日期</th><th>金额</th><th>状态</th></tr></thead><tbody id="invoiceBody"></tbody></table></div><div id="invoicePagination"></div></div></main>
  <div class="toast-container" id="toastContainer"></div><div class="modal-overlay" id="modalOverlay" style="display:none;"><div class="modal"><div class="modal__header" id="modalHeader"></div><div class="modal__body" id="modalBody"></div><div class="modal__footer" id="modalFooter"></div></div></div>
  <script src="./config.js"></script>
  <script src="./common.js"></script>
  <script>
    initTheme(); initSidebar(); initNavbar(); initMobileDrawer();
    const state = { invoices: [], page:1, pageSize:10 };
    async function loadPage(){ try{ const res = await request("/invoices?page=1&pageSize=200"); state.invoices = res?.data?.list || res?.data || []; renderList(); }catch(err){ showToast("error","发票加载失败："+(err?.message||"未知错误")); } }
    function paginate(list,page,size){ const total=list.length; return { total, rows:list.slice((page-1)*size, (page-1)*size+size) }; }
    function renderList(){ let list=state.invoices; list=filterByField(list,"invoiceNo",document.getElementById("filterNo").value.trim()); list=filterByField(list,"customerName",document.getElementById("filterCustomer").value.trim()); list=filterByField(list,"status",document.getElementById("filterStatus").value); const pageData=paginate(list,state.page,state.pageSize); document.getElementById("invoiceBody").innerHTML = pageData.rows.length ? pageData.rows.map((x)=>`<tr onclick="showDetail('${_escAttr(x.id)}')" style="cursor:pointer;"><td>${_escHtml(x.invoiceNo||"-")}</td><td>${_escHtml(x.customerName||"-")}</td><td>${_escHtml(x.deliveryNo||x.deliveryOrderId||"-")}</td><td>${_escHtml((x.invoiceDate||"").slice(0,10))}</td><td>${x.totalAmount||0}</td><td>${renderBadge(x.status)}</td></tr>`).join("") : '<tr><td colspan="6"><div class="empty-state"><span class="empty-state__text">暂无数据</span></div></td></tr>'; renderPagination("invoicePagination",pageData.total,state.page,state.pageSize,(p,s)=>{ state.page=p; state.pageSize=s; renderList(); }); }
    function resetFilter(){ ["filterNo","filterCustomer"].forEach((id)=>document.getElementById(id).value=""); document.getElementById("filterStatus").value=""; renderList(); }
    async function showDetail(id){ try{ const res = await request(`/invoices/${id}`); const inv = res?.data || res; const rows=(inv.items||[]).map((it)=>`<tr><td>${_escHtml(it.productName||it.productId||"-")}</td><td>${it.qty||0}</td><td>${it.unitPrice||0}</td><td>${it.amount||0}</td></tr>`).join(""); showModal({ title:"发票详情", body:`<div>发票号：${_escHtml(inv.invoiceNo||"-")}</div><div>客户：${_escHtml(inv.customerName||"-")}</div><div>金额：${inv.totalAmount||0}</div><table class="table" style="margin-top:8px;"><thead><tr><th>商品</th><th>数量</th><th>单价</th><th>金额</th></tr></thead><tbody>${rows||"<tr><td colspan='4'>无明细</td></tr>"}</tbody></table>`, footer:`<button class="btn btn--default btn--sm" onclick="closeModal()">关闭</button>` }); }catch(err){ showToast("error","详情加载失败："+(err?.message||"未知错误")); } }
    loadPage();
  </script>
</body></html>
